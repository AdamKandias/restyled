<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .photo-upload {
            display: flex;
            gap: 10px;
        }

        .photo-upload div {
            width: 100px;
            height: 100px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 5px;
            overflow: hidden;
        }

        .photo-upload div img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden {
            display: none;
        }

        .nunito {
            font-family: "Nunito", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        .btn-login {
            background-color: #006d5b;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container nunito">
        <h4 class="text-center font-weight-bold">Tambah Produk</h4>

        <label class="font-weight-bold mt-3">Foto</label>
        <div class="photo-upload" id="photoUpload">
            <div onclick="uploadImage(0)">+</div>
            <div onclick="uploadImage(1)"></div>
            <div onclick="uploadImage(2)"></div>
            <div onclick="uploadImage(3)"></div>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="previewImage(event)">

        <div class="form-group mt-3">
            <label class="font-weight-bold">Nama Produk</label>
            <input type="text" class="form-control" placeholder="Masukkan nama produk">
        </div>

        <div class="form-group">
            <label class="font-weight-bold">Deskripsi</label>
            <textarea class="form-control" rows="3" placeholder="Masukkan deskripsi"></textarea>
        </div>

        <h5 class="font-weight-bold mt-3">Detail Produk</h5>

        <div class="form-group">
            <label>Tipe Transaksi</label>
            <select class="form-control">
                <option>Pilih tipe transaksi</option>
            </select>
        </div>

        <div class="form-group">
            <label>Ukuran</label>
            <select class="form-control">
                <option>Pilih ukuran</option>
            </select>
        </div>

        <div class="form-group">
            <label>Kondisi Produk</label>
            <select class="form-control">
                <option>Pilih kondisi produk</option>
            </select>
        </div>

        <div class="form-group">
            <label class="font-weight-bold">Harga</label>
            <input type="text" class="form-control" placeholder="Rp. 0,00">
        </div>

        <button class="btn btn-login btn-block">Unggah</button>
    </div>

    <script>
        let selectedIndex = 0;

        function uploadImage(index) {
            selectedIndex = index;
            document.getElementById('fileInput').click();
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.querySelectorAll('.photo-upload div')[selectedIndex].innerHTML = `<img src="${e.target.result}" alt="Foto">`;
                    moveToNextSlot();
                };
                reader.readAsDataURL(file);
            }
        }

        function moveToNextSlot() {
            const slots = document.querySelectorAll('.photo-upload div');
            for (let i = 0; i < slots.length; i++) {
                if (slots[i].innerHTML.trim() === '') {
                    slots[i].innerHTML = '+';
                    return;
                }
            }
        }
    </script>
</body>

</html>
